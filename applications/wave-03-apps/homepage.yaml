apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # Vendored raw manifests, no chart — see spec 007 ("Install method").
  source:
    repoURL: https://github.com/jangroth/homekube-apps.git
    path: applications/wave-03-apps/homepage
    targetRevision: HEAD
