# Homepage config files, mounted verbatim at /app/config.
# Editing the dashboard = editing this file + ArgoCD sync.
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  # docker.yaml / custom.css / custom.js are unused but must exist: /app/config
  # is a read-only configMap mount, and homepage crashes trying to skeleton-copy
  # any missing config file into it (EROFS).
  docker.yaml: ""
  proxmox.yaml: ""
  custom.css: ""
  custom.js: ""
  settings.yaml: |
    title: homekube
    headerStyle: clean
    # Placeholder background (from the gethomepage docs example) — swap at will.
    background:
      image: https://images.unsplash.com/photo-1502790671504-542ad42d5189?auto=format&fit=crop&w=2560&q=80
      blur: sm
      saturate: 50
      brightness: 50
      opacity: 50
    cardBlur: sm
    # Info widgets (longhorn) read their backend from providers, not widgets.yaml.
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc
  kubernetes.yaml: |
    mode: cluster
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homekube
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    # Longhorn is an *info* widget in homepage, not a service widget.
    # Its URL lives in settings.yaml under providers.
    - longhorn:
        expanded: true
        total: true
        labels: true
        nodes: false
    - openmeteo:
        label: Cronulla
        latitude: -34.06
        longitude: 151.15
        timezone: Australia/Sydney
        units: metric
        cache: 5
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: false
  services.yaml: |
    - GitOps:
        - ArgoCD:
            icon: argo-cd.png
            href: https://192.168.86.241
            description: GitOps controller
            widget:
              type: argocd
              url: https://argocd-server.argocd.svc
              key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
    - Storage:
        - Longhorn:
            icon: longhorn.png
            href: http://192.168.86.242
            description: Distributed block storage
    - Observability:
        - Grafana:
            icon: grafana.png
            href: https://192.168.86.243
            description: Dashboards
        - Prometheus:
            icon: prometheus.png
            href: http://pi0:30002
            description: Metrics
            widget:
              type: prometheus
              url: http://prometheus-kube-prometheus-prometheus.observability.svc:9090
        - Alertmanager:
            icon: alertmanager.png
            href: http://pi0:30004
            description: Alert routing
    - Identity:
        - Dex:
            icon: dex.png
            href: https://pi0.taild13083.ts.net/dex
            description: OIDC federation (Google)
  bookmarks.yaml: |
    - Repos:
        - homekube:
            - icon: github.png
              href: https://github.com/jangroth/homekube
        - homekube-apps:
            - icon: github.png
              href: https://github.com/jangroth/homekube-apps
        - homekube-main:
            - icon: github.png
              href: https://github.com/jangroth/homekube-main
    - Docs:
        - Homepage:
            - icon: homepage.png
              href: https://gethomepage.dev
