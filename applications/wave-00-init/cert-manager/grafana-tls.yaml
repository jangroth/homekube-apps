apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: observability
spec:
  secretName: grafana-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: homekube-ca
    kind: ClusterIssuer
  dnsNames:
    - prometheus-grafana.observability.svc.cluster.local
  ipAddresses:
    - 192.168.86.243
