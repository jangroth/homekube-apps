apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  labels:
    wave: "01"
  annotations:
    argocd.argoproj.io/sync-wave: "01"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 87.0.1
    helm: # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
      values: |
        defaultRules:
          disabled:
            KubeProxyDown: true

        grafana:
          enabled: true
          defaultDashboardsEnabled: true
          defaultDashboardsTimezone: Australia/Sydney
          persistence:
            enabled: false
          service:
            type: LoadBalancer
            annotations:
              io.cilium/lb-ipam-ips: "192.168.86.243"
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.observability.svc.cluster.local:3100
              access: proxy
              isDefault: false
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              longhorn:
                gnetId: 13032
                revision: 6     # re-verify against grafana.com/dashboards/13032 at install time
                datasource: Prometheus
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 200m

        prometheus:
          podDisruptionBudget:
            enabled: true
          service:
            type: NodePort
            nodePort: 30002
          prometheusSpec:
            retention: 15d
            retentionSize: 40GiB
            serviceMonitorSelectorNilUsesHelmValues: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 50Gi
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node-role.kubernetes.io/control-plane
                          operator: DoesNotExist
            resources:
              requests:
                memory: 2Gi
                cpu: 200m
              limits:
                memory: 4Gi
                cpu: 1000m

        alertmanager:
          enabled: true
          podDisruptionBudget:
            enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: telegram
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
            receivers:
              - name: "null"
              - name: telegram
                telegram_configs:
                  - chat_id: 173229021
                    bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot_token
                    send_resolved: true
                    parse_mode: HTML
          service:
            type: NodePort
            nodePort: 30004
          alertmanagerSpec:
            secrets:
              - alertmanager-telegram
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node-role.kubernetes.io/control-plane
                          operator: DoesNotExist
            resources:
              requests:
                memory: 128Mi
                cpu: 10m
              limits:
                memory: 256Mi
                cpu: 100m

        prometheus-node-exporter:
          resources:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 100m

        kube-state-metrics:
          resources:
            requests:
              memory: 128Mi
              cpu: 10m
            limits:
              memory: 256Mi
              cpu: 100m
