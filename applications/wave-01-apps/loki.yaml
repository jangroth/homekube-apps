apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  labels:
    wave: "01"
  annotations:
    argocd.argoproj.io/sync-wave: "01"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  source:
    chart: loki
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 7.0.0
    helm:
      values: |
        # SingleBinary: one pod, filesystem backend, Longhorn PVC — no object storage needed.
        deploymentMode: SingleBinary

        loki:
          # Fresh v7 install uses schema v13 + tsdb + filesystem.
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h

          storage:
            type: filesystem

          limits_config:
            retention_period: 2160h  # 90 days

          compactor:
            delete_request_store: filesystem
            retention_enabled: true

          analytics:
            reporting_enabled: false

          resources:
            requests:
              memory: 1Gi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: 500m

        singleBinary:
          replicas: 1
          persistence:
            volumeClaimsEnabled: true
            size: 20Gi
            storageClass: longhorn

        # Disable SimpleScalable components — not used in SingleBinary mode.
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        # Gateway and test component not needed for this deployment.
        gateway:
          enabled: false
        lokiCanary:
          enabled: false
